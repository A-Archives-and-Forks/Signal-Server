syntax = "proto3";

option java_multiple_files = true;

package org.signal.chat.profile.test;

// This may be removed in favor of a canonical libsignal definition in a future release
message PlaintextProfileData {
  string name = 1; // max length = 257
  optional string about = 2; // max length = 512
  optional string aboutEmoji = 3; // max length = 32
  optional string avatar = 4; // max length = 64
  bool phoneNumberSharing = 5;

  // 15 is the highest field number without serialization overhead
  optional bytes padding = 15; // length = 64 - (len(name) + len(about) + len(aboutEmoji) + len(avatar) + 1) % 64

  // next: 6
}
